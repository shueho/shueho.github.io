<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSCU计算工具 - BioDataTools 网页版</title>
    <!-- 全局公用样式（参考001，使用 ../COMMON/） -->
    <link rel="stylesheet" href="../COMMON/global.css">
    <!-- 页面特有样式（global.css 已覆盖全部，无需额外定义） -->
</head>
<body>

    <!-- 公共页眉占位符 -->
    <div id="common-header"></div>

    <div class="main" id="app">
        <div class="page-intro">
            <h2>RSCU计算工具（相对同义密码子使用度）</h2>
            <p>相对同义密码子使用度计算（RSCU）</p>
        </div>

        <!-- 第一步卡片 -->
        <div class="step-card">
            <div class="step-title">第一步：导入 FASTA 序列</div>
            <div class="radio-box">
                <label>
                    <input type="radio" name="inputMode" value="file" checked onchange="switchInput()"> 上传FASTA文件
                </label>
                <label>
                    <input type="radio" name="inputMode" value="text" onchange="switchInput()"> 粘贴FASTA文本
                </label>
            </div>
            <div class="file-input">
                <input type="file" id="fastaFile" accept=".fasta,.fa,.fna,.txt">
            </div>
            <div class="text-input">
                <textarea id="fastaText" placeholder="粘贴标准 FASTA 内容（注意：序列标识第一个空格前的内容将作为基因名称，如有重名请提前修改！）" disabled></textarea>
            </div>
            <div id="msgTip" class="tip-text"></div>
        </div>

        <!-- 第二步卡片 -->
        <div class="step-card">
            <div class="step-title">第二步：参数设置</div>
            <div class="filter-box">
                <label>NCBI 密码子表：</label>
                <select id="codonTableSel"></select>

                <label>计算模式：</label>
                <select id="calcMode">
                    <option value="total">合并所有序列</option>
                    <option value="allGene">各个序列分别计算</option>
                </select>

                <button class="btn" id="gotoNcbiCodon">查看NCBI密码子表</button>
                <button class="btn" onclick="runAnalysis()">开始计算</button>
            </div>

            <div class="custom-codon-box">
                <button class="btn" style="margin-bottom:8px;" id="toggleCustomBtn">展开自定义密码子</button>
                <div id="customInner" class="hide">
                    <p>格式：密码子 氨基酸，终止密码子填 TER，每一行是一组对应</p>
                    <textarea id="customCodonText" placeholder="示例：UUU F"></textarea>
                    <div style="margin-top:8px;display:flex;gap:10px;">
                        <button class="btn" id="loadCustomBtn">加载</button>
                        <button class="btn" id="clearCustomBtn">清空</button>
                    </div>
                    <div id="customTip" class="tip-text"></div>
                </div>
            </div>
            <div id="tableViewTip" class="tip-text"></div>

            <!-- 多列密码子预览区域 -->
            <div class="preview-table-wrap">
                <h4>当前密码子表预览</h4>
                <div id="codonPreview"></div>
            </div>
        </div>

        <!-- 第三步卡片 -->
        <div class="step-card">
            <div class="step-title">第三步：计算结果</div>
            <div class="result-top">
                <button class="btn" id="copyResultBtn" disabled>复制结果(CSV)</button>
                <button class="btn" id="exportCsvBtn" disabled>导出 RSCU 结果(CSV)</button>
            </div>
            <div id="resultBox"></div>
        </div>
    </div>

    <!-- 公共页脚占位符 -->
    <div id="common-footer"></div>

    <!-- 自定义页眉配置（可选） -->
    <script>
        window.headerConfig = {
            author: '作者：地上飞猪',
            bilibiliText: '前往B站主页',
            githubText: 'GitHub项目',
            returnHomeUrl: '../index.html'
        };
    </script>

    <!-- 引入公共组件（路径使用 ../COMMON/） -->
    <script src="../COMMON/utils.js"></script>
    <script src="../COMMON/header.js"></script>
    <script src="../COMMON/footer.js"></script>

    <!-- 外部依赖（密码子表规则） -->
    <script src="../COMMON/sms_genetic_codes.js"></script>
    <script src="../COMMON/codon_config.js"></script>

    <!-- 业务逻辑脚本（完全保留原功能） -->
    <script>
        // ========= 核心工具函数 =========
        function renderCodonPreview(codonMap){
            const previewBox = document.getElementById("codonPreview");
            const codonList = Object.entries(codonMap);
            if(codonList.length === 0){
                previewBox.innerHTML = '<span class="error">暂无密码子数据</span>';
                return;
            }

            // 按第一位碱基分组
            const groupU = [], groupC = [], groupA = [], groupG = [];
            codonList.forEach(([codon, aa]) => {
                const first = codon[0];
                const item = {codon, aa};
                switch(first){
                    case "U": groupU.push(item); break;
                    case "C": groupC.push(item); break;
                    case "A": groupA.push(item); break;
                    case "G": groupG.push(item); break;
                }
            });

            function buildColHtml(list, title){
                let html = `<div class="codon-col"><table class="preview-table">
                    <tr><th colspan="2">${title}</th></tr>
                    <tr><th>密码子</th><th>氨基酸</th></tr>`;
                list.forEach(item => {
                    html += `<tr><td>${item.codon}</td><td>${item.aa}</td></tr>`;
                });
                html += `</table></div>`;
                return html;
            }

            let totalHtml = `<div class="codon-preview-row">`;
            totalHtml += buildColHtml(groupU, "首位: U");
            totalHtml += buildColHtml(groupC, "首位: C");
            totalHtml += buildColHtml(groupA, "首位: A");
            totalHtml += buildColHtml(groupG, "首位: G");
            totalHtml += `</div>`;

            previewBox.innerHTML = totalHtml;
        }

        // ========= 全局变量 =========
        let rawFasta = "";
        let geneList = [];
        let geneSeqMap = new Map();
        let currentCodonTable = {};
        let exportData = [];

        // ========= DOM 节点 =========
        const codonTableSel = document.getElementById("codonTableSel");
        const gotoNcbiCodon = document.getElementById("gotoNcbiCodon");
        const toggleCustomBtn = document.getElementById("toggleCustomBtn");
        const customInner = document.getElementById("customInner");
        const customCodonText = document.getElementById("customCodonText");
        const loadCustomBtn = document.getElementById("loadCustomBtn");
        const clearCustomBtn = document.getElementById("clearCustomBtn");
        const customTip = document.getElementById("customTip");
        const tableViewTip = document.getElementById("tableViewTip");

        const fastaFile = document.getElementById("fastaFile");
        const fastaText = document.getElementById("fastaText");
        const msgTip = document.getElementById("msgTip");

        const calcMode = document.getElementById("calcMode");
        const resultBox = document.getElementById("resultBox");
        const exportCsvBtn = document.getElementById("exportCsvBtn");

        // ========= 页面交互逻辑 =========
        gotoNcbiCodon.onclick = function(){
            window.open("https://www.ncbi.nlm.nih.gov/Taxonomy/Utils/wprintgc.cgi", "_blank");
        };

        function switchInput(){
            const mode = document.querySelector('input[name="inputMode"]:checked').value;
            resetAll();
            if(mode === "file"){
                fastaFile.disabled = false;
                fastaText.disabled = true;
            }else{
                fastaFile.disabled = true;
                fastaText.disabled = false;
            }
        }

        function initCodonSelect(){
            codonTableSel.innerHTML = "";
            for(const id in TABLE_ID_NAME_MAP){
                const opt = document.createElement("option");
                opt.value = id;
                opt.textContent = TABLE_ID_NAME_MAP[id];
                codonTableSel.appendChild(opt);
            }
            const initId = Number(codonTableSel.value);
            currentCodonTable = getCodonTable(initId);
            renderCodonPreview(currentCodonTable);
        }

        codonTableSel.addEventListener("change",function(){
            const id = Number(this.value);
            currentCodonTable = getCodonTable(id);
            tableViewTip.innerHTML = `<span class="success">已切换：${getTableName(id)}</span>`;
            renderCodonPreview(currentCodonTable);
        });

        toggleCustomBtn.onclick = function(){
            customInner.classList.toggle("hide");
        };

        loadCustomBtn.onclick = function(){
            const txt = customCodonText.value.trim();
            if(!txt){
                customTip.innerHTML = '<span class="error">请输入内容</span>';
                return;
            }
            const lines = txt.split(/\r?\n/).filter(line => line.trim());
            const temp = {};
            let ok = true;
            for(const line of lines){
                const p = line.trim().split(/\s+/);
                if(p.length < 2){ ok=false; break; }
                temp[p[0].toUpperCase()] = p[1];
            }
            if(!ok){
                customTip.innerHTML = '<span class="error">格式错误</span>';
                return;
            }
            currentCodonTable = temp;
            customTip.innerHTML = '<span class="success">加载成功</span>';
            tableViewTip.innerHTML = '<span class="success">当前：自定义密码子表</span>';
            renderCodonPreview(currentCodonTable);
        };

        clearCustomBtn.onclick = function(){
            customCodonText.value = "";
            customTip.innerHTML = "";
        };

        fastaFile.addEventListener("change",function(e){
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(ev){
                rawFasta = ev.target.result;
                msgTip.innerHTML = `<span class="success">已读取：${file.name}</span>`;
                window.showToast(`✅ 文件 ${file.name} 加载成功`);
                parseFasta(rawFasta);
            };
            reader.readAsText(file);
        });

        function parseFasta(str){
            geneList = [];
            geneSeqMap.clear();
            const lines = str.split(/\r?\n/).filter(line=>line.trim());
            let name = "", seq = "";
            for(const line of lines){
                if(line.startsWith(">")){
                    if(name && seq){
                        const rna = seq.toUpperCase().replace(/[^ATGC]/g,"").replace(/T/g,"U");
                        geneList.push(name);
                        geneSeqMap.set(name, rna);
                    }
                    name = line.replace(/^>\s*/,"").trim().split(/\s+/)[0];
                    seq = "";
                }else{
                    seq += line;
                }
            }
            if(name && seq){
                const rna = seq.toUpperCase().replace(/[^ATGC]/g,"").replace(/T/g,"U");
                geneList.push(name);
                geneSeqMap.set(name, rna);
            }
            resetResult();
        }

        function getCodonCount(rnaSeq){
            const count = {};
            const allCodonList = Object.keys(currentCodonTable);
            allCodonList.forEach(c => count[c] = 0);

            const fullLen = Math.floor(rnaSeq.length / 3) * 3;
            for(let i=0; i<fullLen; i+=3){
                const codon = rnaSeq.substr(i,3);
                if(count.hasOwnProperty(codon)){
                    count[codon]++;
                }
            }
            return count;
        }

        function calcRSCU(targetGene){
            let totalCount = {};
            const allCodon = Object.keys(currentCodonTable);
            allCodon.forEach(c=>totalCount[c] = 0);

            if(targetGene === "Total"){
                for(const g of geneList){
                    const cnt = getCodonCount(geneSeqMap.get(g));
                    allCodon.forEach(c=> totalCount[c] += cnt[c]||0);
                }
            }else{
                const cnt = getCodonCount(geneSeqMap.get(targetGene));
                allCodon.forEach(c=> totalCount[c] = cnt[c]||0);
            }

            const aaGroup = {};
            for(const c of allCodon){
                const aa = currentCodonTable[c];
                if(!aaGroup[aa]) aaGroup[aa] = [];
                aaGroup[aa].push(c);
            }

            let html = `<div class="result-item">`;
            html += `<div class="gene-title">${targetGene === "Total" ? "合并所有基因" : "基因：" + targetGene}</div>`;
            html += `<table>
                <tr>
                    <th>密码子</th>
                    <th>氨基酸(单字母)</th>
                    <th>氨基酸(三字母)</th>
                    <th>使用频数</th>
                    <th>RSCU值</th>
                </tr>`;

            const data = [];
            for(const c of allCodon){
                const aaOne = currentCodonTable[c];
                const aaThree = AA_ONE_TO_THREE[aaOne] || "";
                const group = aaGroup[aaOne] || [];
                const sum = group.reduce((s,item)=> s + (totalCount[item]||0), 0);
                const num = group.length;
                let rscu = 0;
                if(sum > 0 && num > 0){
                    rscu = totalCount[c] / (sum / num);
                }
                const freq = totalCount[c] || 0;

                html += `<tr>
                    <td>${c}</td>
                    <td>${aaOne}</td>
                    <td>${aaThree}</td>
                    <td>${freq}</td>
                    <td>${rscu.toFixed(4)}</td>
                </tr>`;

                data.push({
                    gene: targetGene === "Total" ? "Total" : targetGene,
                    codon: c,
                    aaOne: aaOne,
                    aaThree: aaThree,
                    frequency: freq,
                    rscu: rscu.toFixed(4)
                });
            }
            html += `</table></div>`;
            return {html, data};
        }

        function resetResult(){
            resultBox.innerHTML = "";
            exportData = [];
            exportCsvBtn.disabled = true;
            copyResultBtn.disabled = true;
        }

        function resetAll(){
            rawFasta = "";
            fastaFile.value = "";
            fastaText.value = "";
            msgTip.innerHTML = "";
            tableViewTip.innerHTML = "";
            customTip.innerHTML = "";
            resetResult();
        }

        function runAnalysis(){
            if(document.querySelector('input[name="inputMode"][value="text"]:checked')){
                rawFasta = fastaText.value;
            }
            if(!rawFasta){
                resultBox.innerHTML = '<span class="error">❌ 无有效序列</span>';
                return;
            }
            parseFasta(rawFasta);
            if(geneList.length === 0){
                resultBox.innerHTML = '<span class="error">❌ 未解析到有效基因</span>';
                return;
            }

            const mode = calcMode.value;
            let outHtml = "";
            exportData = [];

            if(mode === "total"){
                const res = calcRSCU("Total");
                outHtml = res.html;
                exportData = exportData.concat(res.data);
            }else{
                for(const g of geneList){
                    const res = calcRSCU(g);
                    outHtml += res.html;
                    exportData = exportData.concat(res.data);
                }
            }

            resultBox.innerHTML = outHtml;
            exportCsvBtn.disabled = false;
            copyResultBtn.disabled = false; 
            window.showToast('✅ 计算完成');
        }

        function exportToCSV(){
            if(exportData.length === 0) return;
            let csv = "\ufeff基因名称,密码子,氨基酸(单字母),氨基酸(三字母),使用频数,RSCU值\n";
            exportData.forEach(item=>{
                csv += `${item.gene},${item.codon},${item.aaOne},${item.aaThree},${item.frequency},${item.rscu}\n`;
            });
            const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "RSCU结果.csv";
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(url);
            window.showToast('✅ 导出成功');
        }
function copyResultToClipboard() {
    if (exportData.length === 0) {
        window.showToast('❌ 暂无可复制的结果');
        return;
    }
    let csv = "\ufeff基因名称,密码子,氨基酸(单字母),氨基酸(三字母),使用频数,RSCU值\n";
    exportData.forEach(item => {
        csv += `${item.gene},${item.codon},${item.aaOne},${item.aaThree},${item.frequency},${item.rscu}\n`;
    });
    navigator.clipboard.writeText(csv).then(() => {
        window.showToast('✅ 结果已复制到剪贴板');
    }).catch(() => {
        window.showToast('❌ 复制失败，请手动复制');
    });
}
document.getElementById('copyResultBtn').addEventListener('click', copyResultToClipboard);


        exportCsvBtn.addEventListener("click", exportToCSV);
        window.onload = initCodonSelect;
    </script>
</body>
</html>
